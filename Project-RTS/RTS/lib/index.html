<!DOCTYPE html>
<html>
<head>
    <title>Railway Reservation</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>🚆 Railway Ticket Booking</h1>

    <input id="name" placeholder="Full Name">
    <input id="phone" placeholder="Phone Number">
    <input id="aadhaar" placeholder="Aadhaar Number">

    <input id="source" placeholder="Source">
    <input id="dest" placeholder="Destination">

    <button onclick="searchTrains()">Search Trains</button>

    <div id="error" class="error"></div>

    <h2>Available Trains</h2>
    <div id="trainList"></div>

    <div id="details"></div>

</div>

<script src="script.js"></script>
</body>
</html>
